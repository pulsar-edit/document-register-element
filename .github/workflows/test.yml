on:
  pull_request:
  push:
    branches: [ 'master' ]

jobs:
  Test:

    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        node-version: [ 20.x, '${{ vars.NODE_VERSION }}' ]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout the latest code
      uses: actions/checkout@v6

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}

    - run: npm ci
    - run: npm test
